<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adhyayan Attendance Report</title>

  <link rel="stylesheet" href="../../style/css/styles.css" />
  <script src="../../style/js/config.js"></script>
  <script src="/sessionstorage.js"></script>
  <script src="/style/js/roleCheck.js"></script>
  <script src="../../style/js/tableSortFilter.js"></script>
  <script src="../../style/js/exportToExcel.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

</head>

<body>
  <div class="header">
    <div class="container">
      <div class="logout">
        <a href="javascript:void(0);" onclick="history.back()">Back</a>
        &nbsp; | &nbsp;
        <a href="javascript:void(0);" onclick="goToHome()">Home</a>
        &nbsp; | &nbsp;
        <a href="javascript:void(0);" onclick="logout()">Logout</a>
      </div>
    </div>
  </div>
<script>
    checkRoleAccess(['officeAdmin', 'adhyayanAdmin', 'superAdmin','adhyayanAdminKol', 'adhyayanAdminRaj', 'adhyayanAdminDhu', 'adhyayanAdminReadOnly']);
  </script>


  <div class="middlecontent">
    <div class="container">
      <div class="whitesec">
        <div class="inner-padding">
          <div class="frm-head">
            <h1 id="pageHeading">Attendance Report</h1>
          </div>

          <div class="bulk-action-panel" style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px; padding: 10px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px;">
            <span style="font-weight: bold; font-size: 14px; color: #333;">Bulk Action:</span>
            <select id="bulkSessionSelect" class="form-control" style="width: auto; padding: 5px 10px; min-width: 150px;">
              <option value="">Select Session...</option>
            </select>
            <button id="btnBulkPresent" class="btn" style="background-color: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;" disabled>Mark Selected Present</button>
            <button id="btnBulkAbsent" class="btn" style="background-color: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;" disabled>Mark Selected Absent</button>
            <span id="selectedCountText" style="font-size: 13px; color: #6c757d; margin-left: auto;">0 selected</span>
          </div>

          <input
            type="text"
            id="tableSearch"
            class="form-control search-box"
            placeholder="Search..."
          />

          <div class="table-responsive">
            <table id="attendanceTable" class="table table-bordered table-striped">
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>

          <div id="downloadBtnContainer"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="adhyayanAttendanceReport.js"></script>
</body>
</html>
