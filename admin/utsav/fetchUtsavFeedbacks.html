<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Utsav Feedbacks</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>

    <link rel="stylesheet" href="../../style/css/styles.css" />

    <script src="../../style/js/plugin.js"></script>
    <script src="../../style/js/bootstrap-datepicker.min.js"></script>
    <script src="../../style/js/clockpicker.js"></script>
    <script src="../../style/js/custom.js"></script>
    <script src="../../style/js/config.js"></script>
    <script src="/sessionstorage.js"></script>
    <script src="../../style/js/tableSortFilter.js"></script>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script src="fetchUtsavFeedbacks.js"></script>

    <style>
        .modal {
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            max-width: 700px;
            margin: 5% auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            position: relative;
        }

        .modal-content span {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
        }

        .feedback-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
    </style>

</head>

<body>

    <div class="header">

        <div class="container">

            <div class="logout">
                <a href="javascript:void(0);" onclick="history.back()">Back</a>
                &nbsp; | &nbsp;

                <a href="javascript:void(0);" onclick="goToHome()">Home</a>
                &nbsp; | &nbsp;

                <a href="javascript:void(0);" onclick="logout()">Logout</a>
            </div>

        </div>

    </div>

    <div class="middlecontent">

        <div class="container">

            <div class="whitesec">

                <div class="inner-padding">

                    <div class="frm-head">
                        <h1>
                            Utsav Feedbacks
                        </h1>
                    </div>

                    <div class="form">

                        <div style="
                display:flex;
                gap:12px;
                align-items:center;
                margin-bottom:10px;
              ">

                            <input type="text" id="tableSearch" class="form-control search-box"
                                placeholder="Search..." />

                        </div>
                        <div id="downloadBtnContainer"></div>

                    </div>

                    <div class="table-responsive" id="tableContainer"></div>

                </div>

            </div>

        </div>

    </div>

    <!-- FEEDBACK MODAL -->

    <div id="feedbackModal" class="modal" style="display:none;">

        <div class="modal-content">

            <span onclick="closeFeedbackModal()">
                &times;
            </span>

            <h3>
                Feedback Answers
            </h3>

            <div id="feedbackAnswersContainer"></div>

        </div>

    </div>
