<script src="../../style/js/config.js"></script>
<script src="../../style/js/coordinatorAuth.js"></script>

<script>
  checkCoordinatorAuth();
</script>

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Coordinator Dashboard
  </title>

  <link
    rel="stylesheet"
    href="../../style/css/styles.css"
  />

  <style>

.dashboard-grid {

  display: grid;

  grid-template-columns:
    repeat(auto-fit, minmax(300px, 1fr));

  gap: 20px;

  margin-bottom: 20px;
}

.dashboard-card {

  background: #f8f9fb;

  border-radius: 10px;

  padding: 20px;

  border: 1px solid #ddd;
}

.info-row {

  display: flex;

  justify-content: space-between;

  padding: 10px 0;

  border-bottom:
    1px solid #eee;
}

.info-label {

  font-weight: 600;

  color: #1d3557;
}

.info-value {

  color: #333;
}

</style>

  <script
    src="coordinatorDashboard.js"
    defer
  ></script>


</head>

<body>

<div class="header">

  <div class="container">

    <div class="logout">

      <a
        href="javascript:void(0);"
        onclick="coordinatorLogout()"
      >
        Logout
      </a>

    </div>

  </div>

</div>

<div class="middlecontent">

  <div class="container">

    <div class="whitesec">

      <div class="inner-padding">

        <h2>
          Coordinator Dashboard
        </h2>

        <!-- COORDINATOR INFO -->

        <div class="dashboard-grid">

  <!-- COORDINATOR CARD -->

  <div class="dashboard-card">

    <h3>
      Coordinator Details
    </h3>

    <div id="coordinatorInfo">

    </div>

  </div>

  <!-- BUS CARD -->

  <div class="dashboard-card">

    <h3>
      Assigned Bus
    </h3>

    <div id="busInfo">

    </div>

  </div>

</div>

<hr />

        <div id="busInfo">

        </div>
        <div id="busSummary">

</div>
        <hr />

        <!-- PASSENGERS -->

        <h3>
          Passengers
        </h3>

        <div class="table-responsive">

          <table
            class="table table-striped table-bordered"
            id="passengerTable"
          >

            <thead>

              <tr>

                <th>#</th>

                <th>Name</th>

                <th>Mobile</th>

                <th>Pickup</th>

                <th>Drop</th>


              </tr>

            </thead>

            <tbody>

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
