<script>
  checkRoleAccess(['travelAdmin', 'superAdmin']);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Travel Bus Details</title>

  <!-- jQuery -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="../../style/css/styles.css" />

  <!-- Scripts -->
  <script src="../../style/js/plugin.js"></script>
  <script src="../../style/js/custom.js"></script>
  <script src="../../style/js/config.js"></script>
  <script src="/sessionstorage.js"></script>
  <script src="../../style/js/tableSortFilter.js" defer></script>

  <script src="travelBusDetails.js" defer></script>
</head>

<body>

<div class="header">
  <div class="container">
    <div class="logout">
      <a href="travelBusManagement.html">Back</a>
      &nbsp; | &nbsp;
      <a href="javascript:void(0);" onclick="goToHome()">Home</a>
      &nbsp; | &nbsp;
      <a href="javascript:void(0);" onclick="logout()">Logout</a>
    </div>
  </div>
</div>

<div class="middlecontent">
  <div class="container">

    <div class="whitesec">
      <div class="inner-padding">

        <!-- Bus Info -->
        <div id="busInfoSection">

        </div>

        <!-- Actions -->
        <div class="form-group form-submit">

          <button
            type="button"
            class="btn btn-primary"
            id="openAssignPassengerModal"
          >
            Assign Passengers
          </button>

        </div>

        <!-- Search -->
        <input
          type="text"
          id="tableSearch"
          class="form-control search-box"
          placeholder="Search..."
        >

        <!-- Passenger Table -->
        <div class="table-responsive">

          <table
            id="busPassengerTable"
            class="table table-striped table-bordered"
          >

            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Mobile</th>
                <th>Card No</th>
                <th>Booking ID</th>
                <th>Pickup</th>
                <th>Drop</th>
                <th>Coordinator</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody>

            </tbody>

          </table>

        </div>

      </div>
    </div>

  </div>
</div>

<!-- Assign Passenger Modal -->
<div id="assignPassengerModal" class="modal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:9999;
  overflow:auto;
">

  <div class="modal-content" style="
    background:white;
    padding:2rem;
    margin:3% auto;
    width:95%;
    max-width:1200px;
    border-radius:10px;
    position:relative;
  ">

    <span
      id="closeAssignPassengerModal"
      style="
        position:absolute;
        top:10px;
        right:15px;
        font-size:24px;
        cursor:pointer;
      "
    >
      &times;
    </span>

    <h2>Assign Passengers</h2>
    <div
      style="
        display:flex;
        gap:20px;
        margin-bottom:15px;
      "
    >

      <label>
        <input
          type="checkbox"
          id="showSameRoute"
          checked
        />
        Show This Route Bookings
      </label>

      <label>
        <input
          type="checkbox"
          id="showOtherRoutes"
        />
        Show Other Route Bookings
      </label>

    </div>

    <div class="table-responsive">

      <table
        id="availablePassengerTable"
        class="table table-striped table-bordered"
      >

        <thead>
          <tr>
            <th>Select</th>
            <th>Name</th>
            <th>Mobile</th>
            <th>Card No</th>
            <th>Booking ID</th>
            <th>Pickup</th>
            <th>Drop</th>
            <th>Route Type</th>
            <th>Total People</th>
          </tr>
        </thead>

        <tbody>

        </tbody>

      </table>

    </div>

    <div class="form-group form-submit">

      <button
        type="button"
        class="btn btn-primary"
        id="assignSelectedPassengers"
      >
        Assign Selected
      </button>

    </div>

  </div>
</div>

</body>
</html>
