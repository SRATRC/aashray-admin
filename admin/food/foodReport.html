<!DOCTYPE html>
<html lang="en">

<head>
  <script src="/style/js/roleCheck.js"></script>
  <script>
    checkRoleAccess(['foodAdmin', 'superAdmin']); // customize allowed roles per page
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Report</title>

  <!-- Load jQuery first -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>

  <!-- Scripts -->
  <script src="../../style/js/plugin.js"></script>
  <script src="../../style/js/bootstrap-datepicker.min.js"></script>
  <script src="../../style/js/clockpicker.js"></script>
  <script src="../../style/js/custom.js"></script>
  <script src="../../style/js/config.js"></script>
  <script src="../../style/js/formatDate.js"></script>
  <script src="/sessionstorage.js"></script>
  <script src="foodReport.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="../../style/css/styles.css" />
</head>

<body>
  <div class="header">
    <div class="container">
      <div class="logout">
        <a href="javascript:void(0);" onclick="history.back()">Back</a>
        &nbsp; | &nbsp; <a href="javascript:void(0);" onclick="goToHome()">Home</a>
        &nbsp; | &nbsp; <a href="javascript:void(0);" onclick="logout()">Logout</a>
      </div>
    </div>
  </div>

  <div class="middlecontent">
    <div class="container">
      <div class="whitesec">
        <div class="inner-padding">

          <div class="frm-head">
            <h1 id="reportTitle">Food Report</h1>
          </div>

          <div class="form">
            <form id="foodReportFilterForm">
              <div class="row">
                <div class="form-group">
                  <label for="start_date">Start Date:</label>
                  <input type="date" id="start_date" class="form-control" required />
                </div>

                <div class="form-group">
                  <label for="end_date">End Date:</label>
                  <input type="date" id="end_date" class="form-control" required />
                </div>

                <div class="form-group form-submit" style="display:flex; align-items:center; flex-wrap:wrap; gap:6px;">
                  <button type="submit" class="btn btn-primary">Load Report</button>
                  <button type="button" id="btnToday" class="btn btn-secondary">Today</button>
                  <button type="button" id="btnYesterday" class="btn btn-secondary">Yesterday</button>
                  <button type="button" id="btnDownload" class="btn btn-secondary" onclick="downloadCSV()" disabled
                    style="background:#27ae60; color:#fff; border-color:#27ae60;">
                    ⬇ Download CSV
                  </button>
                  <label style="margin:0; cursor:pointer; font-weight:500; display:flex; align-items:center; gap:5px;">
                    <input type="checkbox" id="ignoreEvents" style="width:14px; height:14px; cursor:pointer;" />
                    Ignore event dates
                  </label>
                </div>

              </div>
            </form>
          </div>

          <div id="alert" class="alert" role="alert" style="display:none;"></div>

          <!-- Breakfast Table -->
          <div class="table-responsive">
            <table class="table table-striped table-bordered">
              <thead>
                <tr>
                  <th colspan="5" class="text-center">Breakfast</th>
                </tr>
                <tr>
                  <th>Date</th>
                  <th>Regd</th>
                  <th>Issued</th>
                  <th>No Show</th>
                  <th>K1 Kitchen Count</th>
                </tr>
              </thead>
              <tbody id="breakfastReportTable"></tbody>
            </table>
          </div>

          <!-- Lunch Table -->
          <div class="table-responsive">
            <table class="table table-striped table-bordered">
              <thead>
                <tr>
                  <th colspan="5" class="text-center">Lunch</th>
                </tr>
                <tr>
                  <th>Date</th>
                  <th>Regd</th>
                  <th>Issued</th>
                  <th>No Show</th>
                  <th>K1 Kitchen Count</th>
                </tr>
              </thead>
              <tbody id="lunchReportTable"></tbody>
            </table>
          </div>

          <!-- Dinner Table -->
          <div class="table-responsive">
            <table class="table table-striped table-bordered">
              <thead>
                <tr>
                  <th colspan="5" class="text-center">Dinner</th>
                </tr>
                <tr>
                  <th>Date</th>
                  <th>Regd</th>
                  <th>Issued</th>
                  <th>No Show</th>
                  <th>K1 Kitchen Count</th>
                </tr>
              </thead>
              <tbody id="dinnerReportTable"></tbody>
            </table>
          </div>

          <!-- Tea/Coffee Table -->
          <div class="table-responsive">
            <table class="table table-striped table-bordered">
              <thead>
                <tr>
                  <th colspan="3" class="text-center">Tea / Coffee</th>
                </tr>
                <tr>
                  <th>Date</th>
                  <th>Tea</th>
                  <th>Coffee</th>
                </tr>
              </thead>
              <tbody id="highteaReportTable"></tbody>
            </table>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>

</html>
