<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="/style/js/roleCheck.js"></script>
    <script>
      checkRoleAccess(['foodAdmin', 'superAdmin']);
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physical Plate Count</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <script src="../../style/js/plugin.js"></script>
    <script src="../../style/js/bootstrap-datepicker.min.js"></script>
    <script src="../../style/js/clockpicker.js"></script>
    <script src="../../style/js/custom.js"></script>
    <script src="../../style/js/config.js"></script>
    <script src="/sessionstorage.js"></script>
    <script src="plateCount.js"></script>

    <link rel="stylesheet" href="../../style/css/styles.css" />

    <style>
      .meals-row {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }

      .meals-row .form-group {
        flex: 1;
        min-width: 120px;
      }

      .meals-row .form-group label {
        font-weight: 600;
      }

      .total-bar {
        margin-top: 14px;
        padding: 10px 14px;
        background: #eaf3ff;
        border: 1px solid #c2d8f5;
        border-radius: 6px;
        font-size: 0.95rem;
        color: #1a4a8a;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .total-bar span {
        font-weight: 700;
        font-size: 1.05rem;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <div class="container">
        <div class="logout">
          <a href="javascript:void(0);" onclick="history.back()">Back</a>
          &nbsp; | &nbsp; <a href="javascript:void(0);" onclick="goToHome()">Home</a>
          &nbsp; | &nbsp; <a href="javascript:void(0);" onclick="logout()">Logout</a>
        </div>
      </div>
    </div>

    <div class="middlecontent">
      <div class="container">
        <div class="whitesec">
          <div class="inner-padding">

            <div class="frm-head">
              <h1>Physical Plate Count</h1>
            </div>

            <div class="form">
              <div id="alert" class="alert" role="alert" style="display:none;"></div>

              <form id="plateCountForm">

                <!-- Date -->
                <div class="form-group">
                  <label for="date">Date:</label>
                  <input type="date" class="form-control" id="date" name="date" required />
                </div>

                <!-- 3 meal inputs in one row -->
                <div class="meals-row">
                  <div class="form-group">
                    <label for="breakfast">Breakfast:</label>
                    <input type="number" class="form-control" id="breakfast" name="breakfast"
                      min="0" placeholder="0" required oninput="updateTotal()" />
                  </div>
                  <div class="form-group">
                    <label for="lunch">Lunch:</label>
                    <input type="number" class="form-control" id="lunch" name="lunch"
                      min="0" placeholder="0" required oninput="updateTotal()" />
                  </div>
                  <div class="form-group">
                    <label for="dinner">Dinner:</label>
                    <input type="number" class="form-control" id="dinner" name="dinner"
                      min="0" placeholder="0" required oninput="updateTotal()" />
                  </div>
                </div>

                <!-- Live total -->
                <div class="total-bar">
                  Total plates for the day: <span id="liveTotal">0</span>
                </div>

                <p id="modeLabel" style="margin:8px 0 0; font-size:0.88rem; font-weight:500; min-height:1.2em;"></p>

                <div class="form-group form-submit" style="margin-top: 10px;">
                  <button type="submit" class="btn btn-primary" id="submitBtn" data-mode="add">Submit</button>
                </div>

              </form>
            </div>

          </div>
        </div>
      </div>
    </div>
  </body>
</html>
