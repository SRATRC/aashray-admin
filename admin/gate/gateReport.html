<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gate Records</title>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>

    <!-- Additional Scripts -->
    <script src="../../style/js/plugin.js"></script>
    <script src="../../style/js/bootstrap-datepicker.min.js"></script>
    <script src="../../style/js/clockpicker.js"></script>
    <script src="../../style/js/custom.js"></script>
    <script src="../../style/js/config.js"></script>
    <script src="../../sessionstorage.js"></script>
    <script src="gateReport.js"></script>
    <script src="../../style/js/tableSortFilter.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" integrity="sha512-r22gChDnGvBylk90+2e/ycr3RVrDi8DIOkIGNhJlKfuyQM4tIRAI062MaV8sfjQKYVGjOBaZBOA87z+IhZE9DA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  
    <!-- Shared Styles -->
    <link rel="stylesheet" href="../../style/css/styles.css" />

    <style>
      .table-responsive {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .table {
        min-width: 1000px;
        width: 100%;
      }
      .pagination {
        display: flex !important;
        list-style: none !important;
        padding-left: 0 !important;
        margin: 0 !important;
        gap: 3px;
      }
      .pagination li {
        display: inline-block !important;
        list-style-type: none !important;
      }
      .pagination li a, .pagination li span {
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 28px;
        height: 28px;
        padding: 0 8px;
        border: 1px solid #e2e8f0;
        border-radius: 9999px;
        color: #475569;
        text-decoration: none;
        background-color: #fff;
        font-weight: 500;
        font-size: 13px;
        transition: all 0.2s ease;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }
      .pagination li a:hover {
        background-color: #f8fafc;
        border-color: #cbd5e1;
        color: #0f172a;
        transform: translateY(-1px);
      }
      .pagination li.active span {
        background-color: #4f46e5;
        color: #fff;
        border-color: #4f46e5;
        box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
      }
      .pagination li.disabled span {
        color: #94a3b8;
        cursor: not-allowed;
        background-color: #f1f5f9;
        border-color: #e2e8f0;
        box-shadow: none;
      }
      .top-bar-container {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        margin-bottom: 15px;
        width: 100%;
      }
      .pagination-container {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: nowrap !important;
      }
      th.sortable {
        cursor: pointer;
        user-select: none;
        position: relative;
        padding-right: 20px !important;
        transition: background-color 0.15s ease, color 0.15s ease;
      }
      th.sortable:hover {
        background-color: rgba(79, 70, 229, 0.06) !important;
        color: #4f46e5 !important;
      }
      th.sortable.active-sort {
        color: #4f46e5 !important;
        background-color: rgba(79, 70, 229, 0.04) !important;
        border-bottom: 2px solid #4f46e5 !important;
        font-weight: 600 !important;
      }
      th.sortable:after {
        content: ' ↕';
        font-size: 11px;
        color: rgba(0, 0, 0, 0.3);
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
      }
      th.sortable.asc:after {
        content: ' ▲';
        color: #4f46e5;
        opacity: 1;
      }
      th.sortable.desc:after {
        content: ' ▼';
        color: #4f46e5;
        opacity: 1;
      }

      /* Status Badges */
      .badge-status {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        white-space: nowrap !important;
      }
      .badge-onprem {
        background-color: #dcfce7;
        color: #166534;
      }
      .badge-offprem {
        background-color: #fee2e2;
        color: #991b1b;
      }

      /* Row status indicators & Hover Highlight */
      tr.status-border-onprem td:first-child {
        border-left: 4px solid #10b981 !important;
      }
      tr.status-border-offprem td:first-child {
        border-left: 4px solid #ef4444 !important;
      }

      @keyframes rowFadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #gateRecords tr {
        animation: rowFadeIn 0.25s ease-out forwards;
        opacity: 0;
        transition: background-color 0.15s ease;
      }
      #gateRecords tr td {
        transition: transform 0.15s ease;
      }
      #gateRecords tr:hover {
        background-color: rgba(79, 70, 229, 0.04) !important;
      }
      #gateRecords tr:hover td {
        transform: translateX(3px);
      }
      .btn-export-csv {
        background-color: #10b981 !important;
        border-color: #10b981 !important;
        color: #ffffff !important;
        height: 38px !important;
        padding: 6px 16px !important;
        font-size: 14px !important;
        font-weight: 500 !important;
        border-radius: 6px !important;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        transition: all 0.2s ease;
        text-decoration: none !important;
        border: none !important;
        white-space: nowrap;
        margin: 0;
      }
      .btn-export-csv:hover {
        background-color: #059669 !important;
        transform: translateY(-1px);
        color: #ffffff !important;
      }

      /* Status Badges */
      .badge-status {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .badge-onprem {
        background-color: #dcfce7;
        color: #166534;
      }
      .badge-offprem {
        background-color: #fee2e2;
        color: #991b1b;
      }

      /* Row status indicators & Hover Highlight */
      tr.status-border-onprem td:first-child {
        border-left: 4px solid #10b981 !important; /* emerald 500 */
      }
      tr.status-border-offprem td:first-child {
        border-left: 4px solid #ef4444 !important; /* red 500 */
      }
      #gateRecords tr:hover {
        background-color: rgba(79, 70, 229, 0.04) !important;
      }

      /* Premium Export Button */
      .btn-export-csv {
        background-color: #10b981 !important;
        border-color: #10b981 !important;
        color: #ffffff !important;
        height: 38px !important;
        padding: 0 16px !important;
        font-size: 13px !important;
        font-weight: 600 !important;
        border-radius: 6px !important;
        display: inline-flex !important;
        align-items: center !important;
        gap: 6px !important;
        cursor: pointer !important;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05) !important;
        transition: all 0.2s ease !important;
        text-decoration: none !important;
        border: none !important;
        white-space: nowrap !important;
        margin: 0 !important;
      }
      .btn-export-csv:hover {
        background-color: #059669 !important;
        transform: translateY(-1px) !important;
        color: #ffffff !important;
      }
      .btn-export-csv:disabled {
        opacity: 0.5 !important;
        cursor: not-allowed !important;
        transform: none !important;
      }

      /* Category Filter Segment Tabs */
      .category-tabs-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 12px;
      }
      .category-tab {
        background: none;
        border: 1px solid #cbd5e1;
        color: #64748b;
        font-size: 14px;
        font-weight: 500;
        padding: 6px 14px;
        cursor: pointer;
        border-radius: 9999px;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        outline: none;
        white-space: nowrap;
      }
      .category-tab:hover {
        background-color: #f1f5f9;
        color: #1e293b;
        border-color: #94a3b8;
      }
      .category-tab.active {
        background-color: #4f46e5;
        color: #ffffff;
        border-color: #4f46e5;
        box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
      }

      /* Mobile Responsive */
      @media (max-width: 680px) {
        .category-tabs-container {
          gap: 6px;
          padding-bottom: 10px;
          margin-bottom: 10px;
        }
        .category-tab {
          font-size: 12px !important;
          padding: 5px 10px !important;
        }
        .gate-toolbar {
          flex-direction: column !important;
          align-items: stretch !important;
          padding: 10px 12px !important;
          gap: 8px !important;
        }
        .gate-toolbar > * {
          width: 100%;
        }
        .gate-toolbar input[type="date"],
        .gate-toolbar input[type="text"] {
          width: 100% !important;
        }
        .btn-export-csv,
        #resetFiltersBtn {
          width: 100% !important;
          justify-content: center !important;
        }
        .gate-date-row {
          display: flex;
          flex-direction: column;
          gap: 8px;
          width: 100%;
        }
        .gate-date-row > div {
          width: 100%;
        }
        .gate-date-row input[type="date"] {
          width: 100% !important;
          box-sizing: border-box;
        }
        .gate-btn-row {
          display: flex;
          gap: 8px;
          width: 100%;
        }
        .gate-btn-row button {
          flex: 1 !important;
        }
        .pagination-container {
          flex-direction: column !important;
          align-items: stretch !important;
          gap: 6px !important;
        }
        #paginationTop,
        #paginationBottom {
          display: flex !important;
          flex-wrap: nowrap !important;
          overflow-x: auto !important;
          -webkit-overflow-scrolling: touch !important;
          gap: 4px !important;
          padding-bottom: 2px !important;
          scrollbar-width: none !important;
        }
        #paginationTop::-webkit-scrollbar,
        #paginationBottom::-webkit-scrollbar {
          display: none;
        }
        .pagination li a,
        .pagination li span {
          min-width: 28px !important;
          height: 28px !important;
          padding: 0 6px !important;
          font-size: 12px !important;
          flex-shrink: 0;
        }
        #paginationInfoTop,
        #paginationInfoBottom {
          font-size: 12px !important;
          white-space: nowrap;
        }
        .pagination-controls {
          display: flex !important;
          flex-wrap: nowrap !important;
          align-items: center;
          gap: 6px !important;
        }
        .frm-head h1 {
          font-size: 18px !important;
        }
      }
      @media (max-width: 420px) {
        .category-tab {
          font-size: 11px !important;
          padding: 4px 8px !important;
        }
      }
    </style>
  </head>


  <body>
    <div class="header">
      <div class="container">
        <div class="logout">
          <a href="javascript:void(0);" onclick="history.back()">Back</a>
          &nbsp; | &nbsp;
          <a href="javascript:void(0);" onclick="goToHome()">Home</a>
          &nbsp; | &nbsp;
          <a href="javascript:void(0);" onclick="logout()">Logout</a>
        </div>
      </div>
    </div>

    <div class="middlecontent">
      <div class="container">
        <div class="whitesec">
          <div class="inner-padding">
            <div class="frm-head">
              <h1>Gate Records</h1>
            </div>

            <div class="form">
              <!-- Row 1: Category Filter Tabs -->
              <div class="category-tabs-container">
                <button class="category-tab active" data-category="">All Categories</button>
                <button class="category-tab" data-category="PR">PR</button>
                <button class="category-tab" data-category="MUMUKSHU">Mumukshu</button>
                <button class="category-tab" data-category="GUEST">Guest</button>
                <button class="category-tab" data-category="SEVA KUTIR">Seva Kutir</button>
              </div>

              <!-- Row 2: Search & Utility Toolbar -->
              <div class="gate-toolbar" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; width: 100%; background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 12px 16px; border-radius: 10px; box-sizing: border-box;">
                <!-- Search -->
                <div class="search-input-wrapper" style="position: relative; display: inline-block; min-width: 180px; flex: 1;">
                  <input type="text" id="tableSearch" class="form-control search-box" placeholder="Search... (Press /)" style="margin: 0; width: 100%; padding-right: 28px; height: 38px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px;" />
                  <span id="clearSearchBtn" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; font-size: 16px; font-weight: bold; display: none; user-select: none;">&times;</span>
                </div>
                <!-- Date range -->
                <div class="gate-date-row" style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                  <div style="display: flex; align-items: center; gap: 6px;">
                    <label for="startDateInput" style="margin: 0; font-size: 13px; color: #475569; font-weight: 500; white-space: nowrap;">From:</label>
                    <input type="date" id="startDateInput" class="form-control" style="margin: 0; height: 38px; padding: 6px 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px;" />
                  </div>
                  <div style="display: flex; align-items: center; gap: 6px;">
                    <label for="endDateInput" style="margin: 0; font-size: 13px; color: #475569; font-weight: 500; white-space: nowrap;">To:</label>
                    <input type="date" id="endDateInput" class="form-control" style="margin: 0; height: 38px; padding: 6px 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px;" />
                  </div>
                </div>
                <!-- Buttons (pushed right) -->
                <div class="gate-btn-row" style="margin-left: auto; display: flex; gap: 8px; align-items: center; flex-shrink: 0;">
                  <button id="exportExcelBtn" class="btn-export-csv" title="Export current search results to Excel">
                    <span>📥</span> Export Excel
                  </button>
                  <button id="resetFiltersBtn" class="btn" style="margin: 0; height: 38px; padding: 0 16px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; cursor: pointer; color: #475569; font-weight: 500; font-size: 13px; transition: all 0.2s ease; white-space: nowrap;">Reset</button>
                </div>
              </div>

              <div class="top-bar-container">
                <div class="pagination-container" id="paginationContainerTop" style="margin-top: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: nowrap; gap: 8px; width: 100%;">
                  <div id="paginationInfoTop" style="color: #666; font-size: 13px; white-space: nowrap; flex-shrink: 0;"></div>
                  <ul id="paginationTop" class="pagination" style="margin: 0; flex-shrink: 0;"></ul>
                  <div class="pagination-controls" style="display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; flex-shrink: 0;">
                    <select id="pageSizeSelectTop" class="form-control" style="width: 70px; height: 30px; padding: 4px 8px; font-size: 13px; display: inline-block;">
                      <option value="10">10</option>
                      <option value="20" selected>20</option>
                      <option value="50">50</option>
                      <option value="100">100</option>
                    </select>
                    <div style="display: flex; align-items: center; gap: 4px; flex-wrap: nowrap;">
                      <label for="gotoPageInputTop" style="margin: 0; font-size: 13px; color: #666; font-weight: normal; white-space: nowrap;">Go to:</label>
                      <input type="number" id="gotoPageInputTop" class="form-control" min="1" style="width: 50px; height: 30px; padding: 4px 6px; font-size: 13px; display: inline-block;">
                      <span style="color: #666; font-size: 13px; white-space: nowrap;">of <span id="totalPagesLabelTop">1</span></span>
                    </div>
                  </div>
                </div>
              </div>

              <div class="table-responsive" style="position: relative;">
                <div id="tableLoader" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.7); z-index: 10; justify-content: center; align-items: center; flex-direction: column;">
                  <div class="spinner"></div>
                  <p style="color: #64748b; margin-top: 8px; font-weight: 500;">Fetching records...</p>
                </div>
                <table id="gateRecordTable" class="table table-striped table-bordered">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th class="sortable" data-sort="cardno">Card No</th>
                      <th class="sortable" data-sort="issuedto">Name</th>
                      <th class="sortable" data-sort="mobno">Mobile Number</th>
                      <th class="sortable" data-sort="status">Status</th>
                      <th class="sortable desc" data-sort="createdAt">createdAt</th>
                    </tr>
                  </thead>
                  <tbody id="gateRecords"></tbody>
                </table>
              </div>

              <div class="pagination-container" id="paginationContainerBottom" style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: nowrap; gap: 8px; width: 100%;">
                <div id="paginationInfoBottom" style="color: #666; font-size: 13px; white-space: nowrap; flex-shrink: 0;"></div>
                <ul id="paginationBottom" class="pagination" style="margin: 0; flex-shrink: 0;"></ul>
                <div class="pagination-controls" style="display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; flex-shrink: 0;">
                  <div class="page-size-selector" style="display: flex; align-items: center; gap: 4px; flex-wrap: nowrap;">
                    <label for="pageSizeSelectBottom" style="margin: 0; font-size: 13px; color: #666; white-space: nowrap;">Items per page:</label>
                    <select id="pageSizeSelectBottom" class="form-control" style="width: 70px; height: 30px; padding: 4px 8px; font-size: 13px; display: inline-block;">
                      <option value="10">10</option>
                      <option value="20" selected>20</option>
                      <option value="50">50</option>
                      <option value="100">100</option>
                    </select>
                  </div>
                  <div class="page-goto-selector" style="display: flex; align-items: center; gap: 4px; flex-wrap: nowrap;">
                    <label for="gotoPageInputBottom" style="margin: 0; font-size: 13px; color: #666; font-weight: normal; white-space: nowrap;">Go to:</label>
                    <input type="number" id="gotoPageInputBottom" class="form-control" min="1" style="width: 50px; height: 30px; padding: 4px 6px; font-size: 13px; display: inline-block;">
                    <span style="color: #666; font-size: 13px; white-space: nowrap;">of <span id="totalPagesLabelBottom">1</span></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
