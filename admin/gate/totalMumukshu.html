<script src="/style/js/roleCheck.js"></script>
<script>
  checkRoleAccess(['gateAdmin', 'superAdmin']);
</script>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mumukshus Report</title>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>

    <!-- Scripts -->
    <script src="../../style/js/plugin.js"></script>
    <script src="../../style/js/bootstrap-datepicker.min.js"></script>
    <script src="../../style/js/clockpicker.js"></script>
    <script src="../../style/js/custom.js"></script>
    <script src="../../style/js/config.js"></script>
    <script src="../../sessionstorage.js"></script>
    <script src="totalMumukshu.js"></script>
    <script src="../../style/js/tableSortFilter.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" integrity="sha512-r22gChDnGvBylk90+2e/ycr3RVrDi8DIOkIGNhJlKfuyQM4tIRAI062MaV8sfjQKYVGjOBaZBOA87z+IhZE9DA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="../../style/css/styles.css" />
    <style>
      .custom-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9999;
      }

      .custom-modal-content {
        background: #fff;
        padding: 20px;
        margin: 5% auto;
        width: 80%;
        max-height: 80%;
        overflow-y: auto;
        border-radius: 8px;
        position: relative;
      }

      .custom-modal table th,
      .custom-modal table td {
        white-space: nowrap;
      }

      .pagination {
        display: flex !important;
        list-style: none !important;
        padding-left: 0 !important;
        margin: 0 !important;
        gap: 5px;
      }
      .pagination li {
        display: inline-block !important;
        list-style-type: none !important;
      }
      .pagination li a, .pagination li span {
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 34px;
        height: 34px;
        padding: 0 12px;
        border: 1px solid #e2e8f0;
        border-radius: 9999px;
        color: #475569;
        text-decoration: none;
        background-color: #fff;
        font-weight: 500;
        transition: all 0.2s ease;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }
      .pagination li a:hover {
        background-color: #f8fafc;
        border-color: #cbd5e1;
        color: #0f172a;
        transform: translateY(-1px);
      }
      .pagination li.active span {
        background-color: #4f46e5;
        color: #fff;
        border-color: #4f46e5;
        box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
      }
      .pagination li.disabled span {
        color: #94a3b8;
        cursor: not-allowed;
        background-color: #f1f5f9;
        border-color: #e2e8f0;
        box-shadow: none;
      }
      .top-bar-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
        flex-wrap: wrap;
        width: 100%;
      }
      .pagination-container {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      th.sortable {
        cursor: pointer;
        user-select: none;
        position: relative;
        padding-right: 20px !important;
      }
      th.sortable:after {
        content: ' ↕';
        font-size: 11px;
        color: rgba(0, 0, 0, 0.3);
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
      }
      th.sortable.asc:after {
        content: ' ▲';
        color: #4f46e5;
        opacity: 1;
      }
      th.sortable.desc:after {
        content: ' ▼';
        color: #4f46e5;
        opacity: 1;
      }
      .btn-export-csv {
        background-color: #10b981 !important;
        border-color: #10b981 !important;
        color: #ffffff !important;
        height: 38px !important;
        padding: 6px 16px !important;
        font-size: 14px !important;
        font-weight: 500 !important;
        border-radius: 6px !important;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        transition: all 0.2s ease;
        text-decoration: none !important;
        border: none !important;
        white-space: nowrap;
        margin: 0;
      }
      .btn-export-csv:hover {
        background-color: #059669 !important;
        transform: translateY(-1px);
        color: #ffffff !important;
      }

      /* Modern Custom Modal Styles */
      .custom-modal-backdrop {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(4px);
        z-index: 2000;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      .custom-modal-backdrop.show {
        display: flex;
        opacity: 1;
      }
      .custom-modal-content {
        background-color: #ffffff;
        border-radius: 12px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        width: 90%;
        max-width: 650px;
        overflow: hidden;
        transform: translateY(-20px);
        transition: transform 0.25s ease;
      }
      .custom-modal-backdrop.show .custom-modal-content {
        transform: translateY(0);
      }
      .custom-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px;
        border-bottom: 1px solid #f1f5f9;
        background-color: #f8fafc;
      }
      .custom-modal-header h3 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        color: #0f172a;
      }
      .custom-modal-close-btn {
        background: none;
        border: none;
        font-size: 24px;
        line-height: 1;
        color: #94a3b8;
        cursor: pointer;
        padding: 4px;
        transition: color 0.15s ease;
      }
      .custom-modal-close-btn:hover {
        color: #334155;
      }
      .custom-modal-body {
        padding: 20px;
      }
      .loading-spinner-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 0;
        color: #64748b;
      }
      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #4f46e5;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin-bottom: 12px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      /* Status Badges */
      .badge-status {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .badge-onprem {
        background-color: #dcfce7;
        color: #166534;
      }
      .badge-offprem {
        background-color: #fee2e2;
        color: #991b1b;
      }
      .duration-text {
        font-size: 13px;
        color: #475569;
        font-weight: 500;
      }
      .duration-inside {
        color: #15803d;
      }
      .duration-outside {
        color: #b91c1c;
      }
    </style>
  </head>

  <body>
    <script src="/style/js/roleCheck.js"></script>
    <script>
      checkRoleAccess(['gateAdmin', 'superAdmin']);
    </script>

    <div class="header">
      <div class="container">
        <div class="logout">
          <a href="javascript:void(0);" onclick="history.back()">Back</a> &nbsp; | &nbsp;
          <a href="javascript:void(0);" onclick="goToHome()">Home</a> &nbsp; | &nbsp;
          <a href="javascript:void(0);" onclick="logout()">Logout</a>
        </div>
      </div>
    </div>

    <div class="middlecontent">
      <div class="container">
        <div class="whitesec">
          <div class="inner-padding">
            <div class="frm-head">
              <h1>Mumukshus Report</h1>
            </div>

            <div class="form">
              <div class="top-bar-container">
                <div style="display: flex; align-items: center; gap: 12px;">
                  <input
                    type="text"
                    id="tableSearch"
                    class="form-control search-box"
                    placeholder="Search..."
                    style="margin: 0; width: 220px;"
                  />
                  <button id="exportExcelBtn" class="btn-export-csv" title="Export current search results to Excel" style="margin: 0;">
                    <span>📥</span> Export Excel
                  </button>
                </div>
                <div class="pagination-container" id="paginationContainerTop">
                  <div id="paginationInfoTop" style="color: #666; font-size: 14px; white-space: nowrap;"></div>
                  <ul id="paginationTop" class="pagination" style="margin: 0;"></ul>
                  <div class="pagination-controls" style="display: flex; align-items: center; gap: 10px;">
                    <select id="pageSizeSelectTop" class="form-control" style="width: 80px; height: 34px; padding: 6px 12px; display: inline-block;">
                      <option value="10">10</option>
                      <option value="20" selected>20</option>
                      <option value="50">50</option>
                      <option value="100">100</option>
                    </select>
                    <div style="display: flex; align-items: center; gap: 5px;">
                      <label for="gotoPageInputTop" style="margin: 0; font-size: 14px; color: #666; font-weight: normal; white-space: nowrap;">Go to:</label>
                      <input type="number" id="gotoPageInputTop" class="form-control" min="1" style="width: 65px; height: 34px; padding: 6px 10px; display: inline-block;">
                      <span style="color: #666; font-size: 14px; white-space: nowrap;">of <span id="totalPagesLabelTop">1</span></span>
                    </div>
                  </div>
                </div>
              </div>

              <div class="table-responsive">
                <table id="prResidentsTable" class="table table-striped table-bordered">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th class="sortable" data-sort="cardno">Card No</th>
                      <th class="sortable" data-sort="issuedto">Issued To</th>
                      <th class="sortable" data-sort="mobno">Mobile No</th>
                      <th class="sortable" data-sort="last_checkin">Last Gate in time</th>
                      <th class="sortable" data-sort="last_checkout">Last Gate out time</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                  <tbody id="prResidents"></tbody>
                </table>
              </div>

              <div class="pagination-container" id="paginationContainerBottom" style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; flex-wrap: wrap; gap: 10px;">
                <div id="paginationInfoBottom" style="color: #666; font-size: 14px; white-space: nowrap;"></div>
                <ul id="paginationBottom" class="pagination" style="margin: 0;"></ul>
                <div class="pagination-controls" style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                  <div class="page-size-selector" style="display: flex; align-items: center; gap: 5px;">
                    <label for="pageSizeSelectBottom" style="margin: 0; font-size: 14px; color: #666;">Items per page:</label>
                    <select id="pageSizeSelectBottom" class="form-control" style="width: 80px; height: 34px; padding: 6px 12px; display: inline-block;">
                      <option value="10">10</option>
                      <option value="20" selected>20</option>
                      <option value="50">50</option>
                      <option value="100">100</option>
                    </select>
                  </div>
                  <div class="page-goto-selector" style="display: flex; align-items: center; gap: 5px;">
                    <label for="gotoPageInputBottom" style="margin: 0; font-size: 14px; color: #666; font-weight: normal; white-space: nowrap;">Go to:</label>
                    <input type="number" id="gotoPageInputBottom" class="form-control" min="1" style="width: 65px; height: 34px; padding: 6px 10px; display: inline-block;">
                    <span style="color: #666; font-size: 14px; white-space: nowrap;">of <span id="totalPagesLabelBottom">1</span></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Gate History Modal -->
    <div id="gateHistoryModal" class="custom-modal-backdrop" style="display: none;">
      <div class="custom-modal-content">
        <div class="custom-modal-header">
          <h3 id="gateHistoryTitle">Gate History</h3>
          <button class="custom-modal-close-btn" onclick="closeHistoryModal()">&times;</button>
        </div>
        <div class="custom-modal-body">
          <div id="gateHistoryLoading" class="loading-spinner-container" style="display: none;">
            <div class="spinner"></div>
            <p>Loading history records...</p>
          </div>
          <div class="table-responsive" id="gateHistoryTableContainer" style="max-height: 400px; overflow-y: auto;">
            <table class="table table-striped table-bordered" style="margin-bottom: 0;">
              <thead>
                <tr>
                  <th>Status</th>
                  <th>Time</th>
                  <th>Duration</th>
                  <th>Updated By</th>
                </tr>
              </thead>
              <tbody id="gateHistoryBody">
                <!-- Fetched rows will go here -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
