<!DOCTYPE html>
<html lang="en">

<head>

    <script src="../../style/js/config.js"></script>
    <script src="../../style/js/roleCheck.js"></script>

    <script>
        checkRoleAccess([
            'superAdmin',
            'accountsAdmin',
            'roomAdmin',
            'cardAdmin',
            'officeAdmin',
            'foodAdmin',
            'adhyayanAdmin',
            'travelAdmin',
            'utsavAdmin',
            'avtAdmin',
            'wifiAdmin'
        ]);
    </script>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
        Short Link Management
    </title>

    <link rel="stylesheet" href="../../style/css/styles.css" />

    <style>
        .dashboard-grid {

            display: grid;

            grid-template-columns:
                repeat(auto-fit,
                    minmax(250px, 1fr));

            gap: 20px;

            margin-bottom: 20px;
        }

        .dashboard-card {

            background: #f8f9fb;

            border-radius: 10px;

            padding: 20px;

            border: 1px solid #ddd;
        }

        .summary-value {

            font-size: 28px;

            font-weight: 700;

            margin-top: 10px;
        }

        .summary-label {

            font-size: 14px;

            font-weight: 600;

            color: #555;
        }

        .passenger-controls {

            display: flex;

            gap: 15px;

            margin-bottom: 20px;

            flex-wrap: wrap;
        }

        .passenger-controls input,
        .passenger-controls select {

            padding: 10px;

            border: 1px solid #ccc;

            border-radius: 6px;

            min-width: 220px;
        }

        .form-grid {

            display: grid;

            grid-template-columns:
                repeat(auto-fit,
                    minmax(250px, 1fr));

            gap: 15px;

            margin-top: 20px;
        }

        .form-group {

            display: flex;

            flex-direction: column;
        }

        .form-group label {

            margin-bottom: 6px;

            font-weight: 600;
        }

        .form-group input,
        .form-group select {

            padding: 10px;

            border-radius: 6px;

            border: 1px solid #ccc;
        }

        .action-buttons {

            display: flex;

            gap: 10px;

            flex-wrap: wrap;
        }

        .short-link {

            max-width: 250px;

            overflow: hidden;

            text-overflow: ellipsis;

            white-space: nowrap;

            display: inline-block;
        }
    </style>

    <script src="shortLinks.js" defer></script>

</head>

<body>
    <div class="header">
        <div class="container">
            <div class="logout">
                <a href="travelBusManagement.html">Back</a>
                &nbsp; | &nbsp;
                <a href="javascript:void(0);" onclick="goToHome()">Home</a>
                &nbsp; | &nbsp;
                <a href="javascript:void(0);" onclick="logout()">Logout</a>
            </div>
        </div>
    </div>


    <div class="middlecontent">

        <div class="container">

            <div class="whitesec">

                <div class="inner-padding">

                    <div class="frm-head">

                        <h1>
                            Short Link Management
                        </h1>

                    </div>

                    <!-- SUMMARY -->

                    <div class="dashboard-grid" id="summaryCards">

                    </div>

                    <!-- FILTERS -->

                    <div class="passenger-controls">

                        <input type="text" id="searchInput" placeholder="Search links..." />

                        <select id="typeFilter"></select>
                        <select id="statusFilter">

                            <option value="all">
                                All Status
                            </option>

                            <option value="active">
                                Active
                            </option>

                            <option value="inactive">
                                Inactive
                            </option>

                        </select>

                    </div>

                    <!-- CREATE FORM -->

                    <div class="dashboard-card">

                        <h3>
                            Create Short Link
                        </h3>

                        <form id="shortLinkForm">

                            <div class="form-grid">

                                <div class="form-group">

                                    <label>
                                        Slug
                                    </label>

                                    <input type="text" id="slug" placeholder="wifi-guest" required />

                                </div>

                                <div class="form-group">

                                    <label>
                                        Target URL
                                    </label>

                                    <input type="url" id="target_url" placeholder="https://example.com" required />

                                </div>

                                <div class="form-group">

                                    <label>
                                        Type
                                    </label>

                                    <select id="type"></select>

                                </div>

                            </div>

                            <br />

                            <button type="submit" class="btn btn-primary">
                                Create Link
                            </button>

                        </form>

                    </div>

                    <br />

                    <!-- TABLE -->

                    <div class="table-responsive">

                        <table class="table table-striped table-bordered" id="linksTable">

                            <thead>

                                <tr>

                                    <th>#</th>

                                    <th>Slug</th>

                                    <th>Short URL</th>

                                    <th>Type</th>

                                    <th>Clicks</th>

                                    <th>Status</th>

                                    <th>Created</th>

                                    <th>Actions</th>

                                </tr>

                            </thead>

                            <tbody>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
